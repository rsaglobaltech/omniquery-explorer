apiVersion: v1
kind: Service
metadata:
  name: omniquery-api
  namespace: omniquery
  labels:
    app.kubernetes.io/name: omniquery-explorer
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: omniquery-explorer
    app.kubernetes.io/component: api
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: http
