apiVersion: v1
kind: ConfigMap
metadata:
  name: omniquery-config
  namespace: omniquery
data:
  ENVIRONMENT: "production"
  LLM_PROVIDER: "ollama"
  LLM_MODEL: "llama3.2:latest"
  LLM_OLLAMA_BASE_URL: "http://ollama.omniquery.svc.cluster.local:11434"
  WEB_RATE_LIMIT_PER_MINUTE: "120"
  DB_STATEMENT_TIMEOUT_MS: "30000"
  COST_EXPLAIN_ENABLED: "true"
  COST_MAX_PLAN_COST: "1000000"
  COST_MAX_PLAN_ROWS: "50000000"
  OBS_OTEL_ENABLED: "true"
  OBS_OTEL_ENDPOINT: "http://otel-collector.observability.svc.cluster.local:4318/v1/traces"
