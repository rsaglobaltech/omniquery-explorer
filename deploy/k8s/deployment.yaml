apiVersion: apps/v1
kind: Deployment
metadata:
  name: omniquery-api
  namespace: omniquery
  labels:
    app.kubernetes.io/name: omniquery-explorer
    app.kubernetes.io/component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: omniquery-explorer
      app.kubernetes.io/component: api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      # Keep traffic-serving capacity intact during rolling upgrades.
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: omniquery-explorer
        app.kubernetes.io/component: api
    spec:
      # The image runs as uid 1000 (declared in Dockerfile). Pin
      # securityContext so the pod fails fast on a restrictive cluster.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: api
          image: ghcr.io/CHANGE_ME/omniquery-explorer:v0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: omniquery-config
            - secretRef:
                name: omniquery-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 30
            failureThreshold: 5
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
