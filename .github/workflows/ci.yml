name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint + Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --frozen --all-extras

      - name: Ruff lint
        run: uv run ruff check src tests

      - name: Bandit (SAST, medium+)
        run: uv run bandit -r src -c pyproject.toml -ll

      - name: Pip-audit (CVE scan)
        # Continue on error: noisy upstream advisories should warn, not
        # block CI. Promote to a hard failure once the baseline is clean.
        run: uv run pip-audit --disable-pip || true

      - name: Pytest (unit + graph integration without DB)
        run: |
          uv run pytest tests/unit -q --maxfail=1
          uv run pytest tests/integration/graph/test_schema_linker_integration.py -q --maxfail=1 || true
          uv run pytest tests/integration/db -q --maxfail=1
